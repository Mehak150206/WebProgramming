<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color:#f2f2f2;

    /* Centering the login box */
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    border:1px solid #ccc;
    border-radius:8px;
    width:300px;
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

.login-box button{
    width:100%;
    padding:10px;
    background-color:#007BFF;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.login-box button:hover{
    background-color:#0056b3;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
